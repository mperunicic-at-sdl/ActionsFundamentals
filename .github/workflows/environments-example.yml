name: Environments Example

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
          type: environment
          required: true
jobs: 
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: test
    steps:
      - run: echo "🧪 Testing..."

  load-Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'    
    environment: load-test
    steps:
      - run: |
          echo "🧪 Testing..."
          sleep 15

  prod:
    runs-on: ubuntu-latest
    needs: [test, load-test]
    environment:
      name: prod
      url: https://writeabout.net
    if: github.event.inputs.environment == 'prod'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10
